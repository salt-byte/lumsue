<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura 肤质检测</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Cormorant Garamond', 'Noto Serif SC', 'serif'],
              serif: ['Cormorant Garamond', 'serif'],
              'serif-sc': ['Noto Serif SC', 'serif'],
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Montserrat:wght@200..600&family=Noto+Serif+SC:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --pearl-pink: #FDE2E4;
            --blush-pink: #FFF0F1;
            --rosewood-pink: #E29595;
            --champagne-gold: #AF9B60;
            --soft-gold: #F1E5AC;
            --espresso: #2D2422;
        }
        body {
            background-color: var(--blush-pink);
            color: var(--espresso);
            font-family: 'Cormorant Garamond', 'Noto Serif SC', serif;
            margin: 0;
            padding: 0;
        }
        .serif-heading { font-family: 'Cormorant Garamond', serif; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 50px rgba(60, 42, 33, 0.05);
        }

        .btn-luxe {
            background: linear-gradient(135deg, var(--rosewood-pink) 0%, var(--champagne-gold) 100%);
            color: white;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-luxe:hover {
            box-shadow: 0 10px 30px rgba(226, 149, 149, 0.3);
            transform: translateY(-2px);
        }

        .silk-overlay {
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 100 C 20 0 50 0 100 100' stroke='%23fce4ec' fill='transparent' stroke-width='0.5'/%3E%3C/svg%3E");
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade { animation: fadeIn 1s ease-out forwards; }

        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            background-size: 200% 100%;
            animation: shimmer-anim 2.5s infinite;
        }
        @keyframes shimmer-anim {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        @keyframes audioBar {
            from { transform: scaleY(0.2); opacity: 0.4; }
            to   { transform: scaleY(1);   opacity: 1; }
        }

        @keyframes scan {
            0% { transform: translateY(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(100vh); opacity: 0; }
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.475.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
